<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile viewport — critical for all phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="TechnoPath — SEAIT Campus Guide Map and Navigation System. Find buildings, rooms, and get directions across the SEAIT campus." />
    <meta name="keywords" content="SEAIT, campus, guide, map, navigation, TechnoPath, university" />
    <meta property="og:title" content="TechnoPath — SEAIT Campus Guide" />
    <meta property="og:description" content="Interactive campus map and navigation for SEAIT students and visitors." />
    <meta property="og:type" content="website" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FF9800" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="TechnoPath" />

    <!-- iOS Safari PWA — required for iPhone home screen install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TechnoPath" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icons/splash.png" />

    <!-- Standard PWA -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- Google Material Icons (self-hosted via npm, CDN fallback) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>TechnoPath — SEAIT Campus Guide</title>

    <!-- Dark mode init — prevent FOUC by setting class before first paint -->
    <script>
      (function() {
        var pref = localStorage.getItem('tp_dark_mode');
        if (pref === 'true' || (pref === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark-mode-preload');
        }
      })();
    </script>
    <style>html.dark-mode-preload body { background: #121212; color: #EEE; }</style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
